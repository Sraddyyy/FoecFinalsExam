<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Electronics Fundamental Tracker</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #eff6ff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --bg-page: #f3f4f6;
            --bg-card: #ffffff;
            --border-color: #e5e7eb;
            --success: #059669;
            --success-light: #ecfdf5;
            --error: #dc2626;
            --error-light: #fef2f2;
            --hint-color: #d97706;
            --hint-light: #fffbeb;
            --radius: 12px;
            --transition: all 0.2s ease-in-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.5;
        }

        .quiz-container {
            width: 100%;
            max-width: 650px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .header {
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
        }

        .header h1 {
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-bar {
            flex-grow: 1;
            height: 8px;
            background-color: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 55px;
            text-align: right;
        }

        .question-section {
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            width: 100%;
            padding: 14px 16px;
            text-align: left;
            background: var(--bg-card);
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
        }

        @media (hover: hover) {
            .option-btn:not([disabled]):hover {
                border-color: var(--primary);
                background-color: var(--primary-light);
            }
        }

        .option-btn[disabled] {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: var(--success-light) !important;
            border-color: var(--success) !important;
            color: var(--success);
            font-weight: 600;
        }

        .option-btn.incorrect {
            background-color: var(--error-light) !important;
            border-color: var(--error) !important;
            color: var(--error);
        }

        .hint-toggle-btn {
            background: none;
            border: none;
            color: var(--hint-color);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            align-self: flex-start;
        }

        .hint-box {
            display: none;
            margin-top: 10px;
            padding: 12px;
            background-color: var(--hint-light);
            border-left: 4px solid var(--hint-color);
            border-radius: 4px;
            font-size: 0.9rem;
            color: #92400e;
        }

        .explanation-box {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background-color: #f9fafb;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 0.9rem;
            text-align: center; /* Center elements in the feedback box */
        }

        .image-container {
            margin-bottom: 12px;
        }

        .feedback-img {
            max-width: 150px; /* Limits size on mobile views */
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: none; /* Controlled by JavaScript */
            margin: 0 auto;
        }

        .compliment-text {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 10px;
            font-style: italic;
            letter-spacing: -0.01em;
        }

        .explanation-title {
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-main);
            text-align: left;
        }

        .choice-explanation {
            margin-top: 8px;
            padding-left: 10px;
            border-left: 3px solid var(--border-color);
            color: var(--text-muted);
            text-align: left;
        }

        .nav-section {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            gap: 12px;
        }

        .nav-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .prev-btn {
            background-color: #e5e7eb;
            color: var(--text-main);
        }

        .prev-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .next-btn {
            background-color: var(--primary);
            color: white;
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 480px) {
            body { padding: 8px; }
            .quiz-container { padding: 16px; border-radius: 8px; }
            .option-btn { padding: 12px; font-size: 0.9rem; }
            .nav-btn { padding: 12px 14px; font-size: 0.9rem; }
            .feedback-img { max-width: 120px; }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <h1>Introduction to Electronics (35-Item Comprehensive Exam)</h1>
        <div class="progress-container">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">1 / 35</div>
        </div>
    </div>

    <div class="question-section">

        <div class="options-list" id="optionsList"></div>
        
        <button class="hint-toggle-btn" id="hintToggleBtn" onclick="toggleHint()">💡 Show Hint</button>

            <div class="compliment-text" id="complimentText"></div>

            <div id="expBody"></div>
        </div>
    </div>

    <div class="nav-section">
        <button class="nav-btn prev-btn" id="prevBtn" onclick="navigateQuestion(-1)">Previous</button>
        <button class="nav-btn next-btn" id="nextBtn" onclick="navigateQuestion(1)" disabled>Next</button>

</div>

        correct: 0,
        hint: "This layout connects the base resistor directly to the collector terminal instead of the VCC supply rail.",
        explanations: ["Correct! Collector Feedback Bias routes the base resistor from the collector terminal, automatically stabilizing the operating point via negative feedback.", "Incorrect. Fixed bias provides no feedback path because its base resistor connects directly to the VCC supply rail.", "Incorrect. Emitter bias achieves stability using an emitter resistor and dual power supply rails.", "Incorrect. Matrix configurations are generalized mathematical modeling terms rather than discrete bias circuit layouts."]
    },
    {

        options: ["IB = (VCC - VBE) / [RF + β(RC + RE)]", "IB = (VCC - VBE) / RB", "IB = VTh / (RTh + β * RE)", "IB = (VCC - VBE) / [RB + (β + 1)RE]"],
        correct: 0,

    let currentIdx = 0;
    let selectedAnswers = new Array(quizData.length).fill(null);

    const questionText = document.getElementById("questionText");
    const optionsList = document.getElementById("optionsList");
    const hintBox = document.getElementById("hintBox");
    const hintToggleBtn = document.getElementById("hintToggleBtn");
    const explanationBox = document.getElementById("explanationBox");
    const complimentImage = document.getElementById("complimentImage");
    const complimentText = document.getElementById("complimentText");
    const expTitle = document.getElementById("expTitle");
    const expBody = document.getElementById("expBody");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const progressFill = document.getElementById("progressFill");
    const progressText = document.getElementById("progressText");

    function loadQuestion() {
        const currentQ = quizData[currentIdx];
        hintBox.style.display = "none";
        hintToggleBtn.innerText = "💡 Show Hint";
        explanationBox.style.display = "none";
        complimentImage.style.display = "none"; // Hide image initially
        
        questionText.innerText = `${currentIdx + 1}. ${currentQ.question}`;
        hintBox.innerText = currentQ.hint;
        
        optionsList.innerHTML = "";
        currentQ.options.forEach((opt, index) => {
            const button = document.createElement("button");
            button.className = "option-btn";
            button.innerText = opt;
            button.onclick = () => handleSelectAnswer(index);
            optionsList.appendChild(button);
        });

        prevBtn.disabled = currentIdx === 0;
        nextBtn.disabled = selectedAnswers[currentIdx] === null;

        if (selectedAnswers[currentIdx] !== null) {
            revealAnswerUi(selectedAnswers[currentIdx]);
        }
        updateProgress();
    }

    function handleSelectAnswer(chosenIdx) {
        if (selectedAnswers[currentIdx] !== null) return;
        selectedAnswers[currentIdx] = chosenIdx;
        revealAnswerUi(chosenIdx);
        nextBtn.disabled = false;
    }

    function revealAnswerUi(chosenIdx) {
        const currentQ = quizData[currentIdx];
        const buttons = optionsList.getElementsByClassName("option-btn");
        
        for (let i = 0; i < buttons.length; i++) {
            buttons[i].disabled = true;
            if (i === currentQ.correct) {
                buttons[i].classList.add("correct");
            } else if (i === chosenIdx) {
                buttons[i].classList.add("incorrect");
            }
        }

        const isCorrect = chosenIdx === currentQ.correct;
        
        if (isCorrect) {
            complimentText.innerText = "Nice one, Love";
            complimentText.style.color = "var(--success)";
            // CHANGE THIS TO YOUR CORNER-IMAGE URL/PATH:
            complimentImage.src = "https://cdn.corenexis.com/files/c/6866282720.png";
        } else {
            complimentText.innerText = "No worries, Love";
            complimentText.style.color = "var(--error)";
            // CHANGE THIS TO YOUR WRONG-IMAGE URL/PATH:
            complimentImage.src = "https://cdn.corenexis.com/files/c/6815685720.png";
        }
        
        complimentImage.style.display = "block"; // Make the image visible

        expTitle.innerText = isCorrect ? "✅ Correct Answer Explanation:" : "❌ Incorrect Answer Explanation:";
        expTitle.style.color = isCorrect ? "var(--success)" : "var(--error)";

        let explanationsHtml = "";
        currentQ.options.forEach((_, idx) => {
            explanationsHtml += `<div class="choice-explanation">${currentQ.explanations[idx]}</div>`;
        });
        expBody.innerHTML = explanationsHtml;
        explanationBox.style.display = "block";
    }

    function toggleHint() {
        if (hintBox.style.display === "none") {
            hintBox.style.display = "block";
            hintToggleBtn.innerText = "🙈 Hide Hint";
        } else {
            hintBox.style.display = "none";
            hintToggleBtn.innerText = "💡 Show Hint";
        }
    }

    function navigateQuestion(step) {
        currentIdx += step;
        if (currentIdx >= 0 && currentIdx < quizData.length) {
            loadQuestion();
        } else {
            currentIdx -= step;
        }
    }

    function updateProgress() {
        const percent = ((currentIdx + 1) / quizData.length) * 100;
        progressFill.style.width = `${percent}%`;
        progressText.innerText = `${currentIdx + 1} / ${quizData.length}`;
    }

    window.onload = loadQuestion;
</script>
